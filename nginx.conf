events {}

http {
    # Use Docker embedded DNS and resolve service names at request time.
    # This avoids startup crashes when upstream containers are not yet resolvable
    # at Nginx boot (common during docker compose startup ordering).
    resolver 127.0.0.11 ipv6=off valid=30s;

    # ── Unified entry-point for the cloudflare tunnel ─────────────────────────
    # Point the tunnel at port 80. This proxy sits in front of both the
    # telemedicine frontend (port 3006) and the api-gateway (port 8080) so that
    # both are reachable from the same origin, making window.location.origin a
    # correct base URL for every API call.
    server {
        listen 80;

        # Telemedicine test UI
        location = /test {
            set $telemedicine_upstream telemedicine-service:3006;
            proxy_pass http://$telemedicine_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else (including /sessions/, /auth/, etc.) → api-gateway,
        # which validates JWTs and injects X-User-ID / X-User-Role before
        # forwarding to the appropriate downstream service.
        location / {
            set $api_gateway_upstream api-gateway:8080;
            proxy_pass http://$api_gateway_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Increase body size limit — MinIO needs to handle large file uploads.
    # Set this to whatever your max file size is.
    client_max_body_size 100m;

    server {
        listen 9000;

        # This server block makes localhost:9000 a transparent proxy to minio:9000.
        # Both the browser (for uploads) and document-service (for signing) use this
        # single address, so presigned URL signatures are always valid.
        location / {
            set $minio_s3_upstream minio:9000;
            proxy_pass http://$minio_s3_upstream;

            # Forward the real host so MinIO sees localhost:9000, not minio:9000.
            # This is critical — it keeps the Host header consistent with what
            # was used during signing.
            proxy_set_header Host nginx:9000;

            # Standard proxy headers.
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for large uploads — disable buffering so Nginx streams
            # the body directly to MinIO instead of buffering it to disk first.
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    server {
        listen 9001;

        # Pass-through for the MinIO web console.
        location / {
            set $minio_console_upstream minio:9001;
            proxy_pass http://$minio_console_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}