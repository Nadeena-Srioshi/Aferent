events {}

http {
    # Increase body size limit — MinIO needs to handle large file uploads.
    # Set this to whatever your max file size is.
    client_max_body_size 100m;

    server {
        listen 9000;

        # This server block makes localhost:9000 a transparent proxy to minio:9000.
        # Both the browser (for uploads) and document-service (for signing) use this
        # single address, so presigned URL signatures are always valid.
        location / {
            proxy_pass http://minio:9000;

            # Forward the real host so MinIO sees localhost:9000, not minio:9000.
            # This is critical — it keeps the Host header consistent with what
            # was used during signing.
            proxy_set_header Host nginx:9000;

            # Standard proxy headers.
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for large uploads — disable buffering so Nginx streams
            # the body directly to MinIO instead of buffering it to disk first.
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }

    server {
        listen 9001;

        # Pass-through for the MinIO web console.
        location / {
            proxy_pass http://minio:9001;
            proxy_set_header Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}