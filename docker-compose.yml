services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    networks: [aferent-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    networks: [aferent-network]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [aferent-network]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aferent-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    networks: [aferent-network]
    ports:
      - "3001:3001"   # exposed for direct testing — remove in production
    environment:
      MONGO_URI: ${MONGO_URI_AUTH_SERVICE}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./logs/auth-service:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    networks: [aferent-network]
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3001
    volumes:
      - ./logs/api-gateway:/app/logs

  minio:
    image: minio/minio:latest
    container_name: minio
    networks: [aferent-network]
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_NOTIFY_KAFKA_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_PRIMARY: "kafka:29092"
      MINIO_NOTIFY_KAFKA_TOPIC_PRIMARY: "minio.events"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-event-init:
    image: minio/mc:latest
    container_name: minio-event-init
    networks: [aferent-network]
    depends_on:
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/app-storage &&
        mc event add local/app-storage arn:minio:sqs::PRIMARY:kafka --event put ||
        echo "MinIO Kafka notification already exists/overlaps; keeping current bucket notification config.";
        mc event list local/app-storage
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: nginx
    networks: [aferent-network]
    ports:
      - "9000:9000"   # MinIO S3 API  — browser hits localhost:9000
      - "9001:9001"   # MinIO console — browser hits localhost:9001
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      minio:
        condition: service_healthy

  document-service:
    build: ./services/document-service
    networks: [aferent-network]
    container_name: document-service
    ports:
      - "3009:3009"
    environment:
      MINIO_ENDPOINT: nginx:9000
      MINIO_PUBLIC_HOST: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: app-storage
      MINIO_USE_SSL: "false"
      SERVER_PORT: "3009"
    depends_on:
      nginx:
        condition: service_started
      minio-event-init:
        condition: service_completed_successfully

  patient-service:
    build:
      context: ./services/patient-service
    container_name: patient-service
    networks: [aferent-network]
    ports:
      - "3002:3002"
    depends_on:
      kafka:
        condition: service_healthy
      document-service:
        condition: service_started
    environment:
      MONGO_URI: ${MONGO_URI_PATIENT_SERVICE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DOCUMENT_SERVICE_URL: http://document-service:3009
      DOCUMENT_SERVICE_ID: patient-service

  doctor-service:
    build:
      context: ./services/doctor-service
    container_name: doctor-service
    networks: [aferent-network]
    ports:
      - "3003:3003"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MONGO_URI: ${MONGO_URI_DOCTOR_SERVICE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET_DOCTOR}
      PRESCRIPTION_BASE_URL: http://localhost:8080
    volumes:
      - ./logs/doctor-service:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    networks: [aferent-network]
    ports:
      - "3007:3007"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      MONGO_URI: ${MONGO_URI_NOTIFICATION_SERVICE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      # SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      # SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      # SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME}
      RESEND_API_KEY: ${RESEND_API_KEY} 
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}
    volumes:
      - ./logs/notification-service:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
  
  appointment-service:
    build:
      context: ./services/appointment-service
    container_name: appointment-service
    networks: [aferent-network]
    ports:
      - "3004:3004"
    environment:
      MONGO_URI: ${MONGO_URI_APPOINTMENT_SERVICE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 3004
      DOCTOR_SERVICE_URL: http://doctor-service:3003
    depends_on:
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: ./services/payment-service
    container_name: payment-service
    networks: [aferent-network]
    ports:
      - "3005:3005"
    environment:
      MONGO_URI: ${MONGO_URI_PAYMENT_SERVICE}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092 
    depends_on:
      kafka:
        condition: service_healthy

networks:
  aferent-network:
    driver: bridge

volumes:
  mongo-data:
  kafka-data:
  minio-data: