services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    networks: [aferent-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    networks: [aferent-network]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [aferent-network]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aferent-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    networks: [aferent-network]
    ports:
      - "3001:3001"   # exposed for direct testing — remove in production
    environment:
      MONGO_URI: ${MONGO_URI_AUTH_SERVICE}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./logs/auth-service:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    networks: [aferent-network]
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3001
    volumes:
      - ./logs/api-gateway:/app/logs

  minio:
    image: minio/minio:latest
    container_name: minio
    networks: [aferent-network]
    ports:
      - "9000:9000"    # API port — presigned URLs point here
      - "9001:9001"    # MinIO web console — visit localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  patient-service:
    build:
      context: ./services/patient-service
    container_name: patient-service
    networks: [aferent-network]
    ports:
      - "3002:3002"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      MONGO_URI: ${MONGO_URI_PATIENT_SERVICE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: patient-documents

networks:
  aferent-network:
    driver: bridge

volumes:
  mongo-data:
  kafka-data:
  minio-data: