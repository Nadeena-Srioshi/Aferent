services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    networks: [aferent-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    networks: [aferent-network]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [aferent-network]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aferent-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    networks: [aferent-network]
    ports:
      - "3001:3001"   # exposed for direct testing — remove in production
    environment:
      MONGO_URI: ${MONGO_URI_AUTH_SERVICE}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./logs/auth-service:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    networks: [aferent-network]
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3001
    volumes:
      - ./logs/api-gateway:/app/logs

  symptom-detector:
    build:
      context: ./services/symptom-detector
      dockerfile: Dockerfile
    container_name: symptom-detector
    restart: unless-stopped
    ports:
      - "3008:3008"
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI_SYMPTOM_SERVICE}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./services/symptom-detector/app:/app/app   # hot-reload in dev; remove in prod
    networks: [aferent-network]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/ai/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  aferent-network:
    driver: bridge

volumes:
  mongo-data:
  kafka-data: