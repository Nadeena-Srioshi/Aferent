server:
  port: 3003

spring:
  application:
    name: doctor-service
  data:
    mongodb:
      uri: ${MONGO_URI}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: doctor-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.HashMap
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  prescription-base-url: ${PRESCRIPTION_BASE_URL:http://localhost:8080}
  doctor-login-url: ${DOCTOR_LOGIN_URL:http://localhost:5173/login}

document-service:
  base-url: ${DOCUMENT_SERVICE_URL:http://localhost:3009}
  service-id: ${DOCUMENT_SERVICE_ID:doctor-service}

kafka-topics:
  minio-events: ${KAFKA_TOPIC_MINIO_EVENTS:minio.events}
  prescription-issued: ${KAFKA_TOPIC_PRESCRIPTION_ISSUED:prescription.issued}