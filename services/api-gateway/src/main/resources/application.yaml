server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:

        # AUTH SERVICE — no JWT needed, whitelisted
        - id: auth-register
          uri: http://auth-service:3001
          predicates:
            - Path=/auth/**
          filters:
            - AddRequestHeader=X-Internal-Request, true

        # PATIENT SERVICE
        - id: patient-service
          uri: http://patient-service:3002
          predicates:
            - Path=/patients/**

        # DOCTOR SERVICE
        - id: doctor-service
          uri: http://doctor-service:3003
          predicates:
            - Path=/doctors/**

        # APPOINTMENT SERVICE
        - id: appointment-service
          uri: http://appointment-service:3004
          predicates:
            - Path=/appointments/**

        # PAYMENT SERVICE
        - id: payment-service
          uri: http://payment-service:3005
          predicates:
            - Path=/payments/**

        # TELEMEDICINE SERVICE
        - id: telemedicine-service
          uri: http://telemedicine-service:3006
          predicates:
            - Path=/sessions/**

        # NOTIFICATION SERVICE
        - id: notification-service
          uri: http://notification-service:3007
          predicates:
            - Path=/notifications/**

        # AI SERVICE
        - id: symptom-detector
          uri: http://symptom-detector:3008
          predicates:
            - Path=/ai/**

app:
  jwt:
    secret: ${JWT_SECRET}

  # Routes that don't need a JWT — gateway skips validation for these
  public-paths:
    - /auth/login
    - /auth/register
    - /auth/refresh
    - /actuator/**
    - /payments/webhook   # payment provider calls this — no JWT, uses HMAC instead
    - /ai/api/v1/symptoms/analyse  # AI endpoint for symptom analysis — no JWT, uses API key

logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"