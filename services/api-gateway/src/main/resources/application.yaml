server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://localhost:4000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:

        # AUTH SERVICE — no JWT needed, whitelisted
        - id: auth-register
          uri: http://auth-service:3001
          predicates:
            - Path=/auth/**
          filters:
            - AddRequestHeader=X-Internal-Request, true

        # PATIENT SERVICE
        - id: patient-service
          uri: http://patient-service:3002
          predicates:
            - Path=/patients/**

        # DOCTOR SERVICE
        - id: doctor-service
          uri: http://doctor-service:3003
          predicates:
            - Path=/doctors/**, /admin/doctors/**,/admin/hospitals/**, /admin/specializations/**, /hospitals/**, /specializations/**

        - id: prescriptions-public
          uri: http://doctor-service:3003
          predicates:
            - Path=/prescriptions/**

        # APPOINTMENT SERVICE
        - id: appointment-service
          uri: http://appointment-service:3004
          predicates:
            - Path=/appointments/**

        # APPOINTMENT SERVICE — debug endpoints (keep behind auth or remove in prod)
        - id: appointment-service-debug
          uri: http://appointment-service:3004
          predicates:
            - Path=/debug/**

        # PAYMENT SERVICE
        - id: payment-service
          uri: http://payment-service:3005
          predicates:
            - Path=/payments/**

        # TELEMEDICINE SERVICE
        - id: telemedicine-service
          uri: http://telemedicine-service:3006
          predicates:
            - Path=/sessions/**

        # NOTIFICATION SERVICE
        - id: notification-service
          uri: http://notification-service:3007
          predicates:
            - Path=/notifications/**

        # AI SERVICE
        - id: ai-service
          uri: http://ai-service:3008
          predicates:
            - Path=/symptom-check/**, /prompts/**

app:
  jwt:
    secret: ${JWT_SECRET}

  # Routes that don't need a JWT — gateway skips validation for these
  public-paths:
    - /auth/login
    - /auth/register
    - /auth/refresh
    - /actuator/**
    - /payments/webhook   # payment provider calls this — no JWT, uses HMAC instead
    - /doctors/register/profile
    - /doctors/register/license-upload-url
    - /doctors/register/license-confirm
    - /hospitals/**
    - /specializations/**
    - /doctors/**
    - /sessions/webhooks  # agora callback endpoint — uses webhook signature, not JWT
    - /debug/**           # debug endpoints — remove or restrict in production

logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"