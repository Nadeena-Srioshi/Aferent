apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-proxy-config
  namespace: aferent
data:
  nginx.conf: |
    events {}

    http {
        client_max_body_size 100m;

        # MinIO S3 API
        server {
            listen 9000;

            location / {
                proxy_pass http://minio:9000;
                proxy_set_header Host minio:9000;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_buffering off;
                proxy_request_buffering off;
            }
        }

        # MinIO Web Console (WebSocket-capable)
        server {
            listen 9001;

            location / {
                proxy_pass http://minio:9001;
                proxy_set_header Host $http_host;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_http_version 1.1;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-proxy
  namespace: aferent
  labels:
    app: minio-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-proxy
  template:
    metadata:
      labels:
        app: minio-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 9000
              name: minio-s3
            - containerPort: 9001
              name: minio-console
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: minio-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: minio-proxy
  namespace: aferent
spec:
  type: LoadBalancer
  selector:
    app: minio-proxy
  ports:
    - name: minio-s3
      port: 9000
      targetPort: 9000
    - name: minio-console
      port: 9001
      targetPort: 9001
