apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aferent-ingress
  namespace: aferent
  annotations:
    # Allow large file uploads (same as nginx client_max_body_size 100m)
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # Longer timeouts for video/streaming endpoints
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Enable WebSocket upgrades (needed for telemedicine real-time features)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Exact match for /test → telemedicine-service directly
          - path: /test
            pathType: Exact
            backend:
              service:
                name: telemedicine-service
                port:
                  number: 3006
          # Everything else → api-gateway
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
