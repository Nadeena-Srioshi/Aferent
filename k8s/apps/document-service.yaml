apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: aferent
  labels:
    app: document-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: document-service
          image: ghcr.io/nathimn/aferent-document-service:latest
          ports:
            - containerPort: 3009
          env:
            - name: SERVER_PORT
              value: "3009"
            - name: MINIO_ENDPOINT
              value: "minio:9000"
            - name: MINIO_PUBLIC_HOST
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_USE_SSL
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: aferent
spec:
  selector:
    app: document-service
  ports:
    - port: 3009
      targetPort: 3009
