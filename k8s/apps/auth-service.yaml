apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: aferent
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: auth-service
          image: ghcr.io/nathimn/aferent-auth-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: MONGO_URI_AUTH_SERVICE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: aferent
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
