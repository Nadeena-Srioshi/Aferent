apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-service
  namespace: aferent
  labels:
    app: doctor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-service
  template:
    metadata:
      labels:
        app: doctor-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: doctor-service
          image: ghcr.io/nathimn/aferent-doctor-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: MONGO_URI_DOCTOR_SERVICE
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: aferent-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: aferent-config
                  key: MINIO_ENDPOINT
            - name: MINIO_PUBLIC_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: aferent-config
                  key: MINIO_PUBLIC_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: aferent-config
                  key: MINIO_BUCKET_DOCTOR
            - name: PRESCRIPTION_BASE_URL
              value: "http://api-gateway:8080"
            - name: DOCUMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: aferent-config
                  key: DOCUMENT_SERVICE_URL
            - name: DOCUMENT_SERVICE_ID
              value: "doctor-service"
          readinessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-service
  namespace: aferent
spec:
  selector:
    app: doctor-service
  ports:
    - port: 3003
      targetPort: 3003
