# One-shot Job that creates the MinIO bucket and sets up Kafka notifications.
# Equivalent to the minio-event-init docker-compose service.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: aferent
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aferent-secrets
                  key: MINIO_ROOT_PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" &&
              mc mb --ignore-existing local/app-storage &&
              mc mb --ignore-existing local/patient-documents &&
              mc mb --ignore-existing local/doctor-docs &&
              mc event add local/app-storage arn:minio:sqs::PRIMARY:kafka --event put ||
              echo "MinIO Kafka notification already exists; skipping.";
              mc event list local/app-storage
